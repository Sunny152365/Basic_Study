<!DOCTYPE html>
<html>
<head>
    <title>{% if form.instance.pk %}글 수정{% else %}새 글 작성{% endif %}</title>
</head>
<body>
    <h1>{% if form.instance.pk %}글 수정{% else %}새 글 작성{% endif %}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">저장</button>
    </form>

    <a href="{% url 'post_list' %}">목록으로</a>
</body>
</html>
