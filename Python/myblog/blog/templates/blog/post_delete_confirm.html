<!DOCTYPE html>
<html>
<head>
    <title>글 삭제 확인</title>
</head>
<body>
    <h1>글 삭제 확인</h1>
    <p>정말 "{{ post.title }}" 글을 삭제하시겠습니까?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">삭제</button>
        <a href="{% url 'post_detail' post.pk %}">취소</a>
    </form>
</body>
</html>
